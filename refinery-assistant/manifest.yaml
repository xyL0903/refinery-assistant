# manifest.yaml — 炼厂综合助理域路由定义

# 声明版本
version: 1.0.0

# 每次必加载的文件（路由协议 + 核心原则）
always_load:
  - SKILL.md

# ========== 轴定义 ==========

axes:

  # ----- 业务域 -----
  domain:
    description: 请求所属的业务领域（可多选）
    detect: "根据用户问题中的关键词匹配到最可能的域，如果不确定按优先级 blending > quality > planning > inventory > crude > risk > logistics > maintenance > safety 猜测，然后问用户"
    default: general
    values:
      blending:
        triggers: [调和, 调合, 调合方案, blending, 配方, 组分油, 辛烷值, 十六烷值, RON, MON, 92#, 95#, 0#柴油, 汽油, 柴油, MTBE, 重整汽油, 催化汽油, 烷基化油, octane, cetane, RVP, 调合, 调和优化, 加氢柴油, 加氢汽油, 组分优化, 产品调和, 油品调和]
        load: static/blending/index.md
      planning:
        triggers: [生产计划, 排产, 调度, 装置负荷, 物料平衡, 常减压, 催化裂化, 重整, 加氢裂化, 计划排产, 月计划, 周计划, 产量计划, planning, production plan, cut point, 切割方案, 原油切换, 装置收率]
        load: static/planning/index.md
      inventory:
        triggers: [库存, 罐存, 库容, 罐区, 周转率, 库存预警, 库存管理, GTC, 罐底, 库存量, 罐存量, 储罐, tank, 移库, storage tank]
        load: static/inventory/index.md
      quality:
        triggers: [质量, 质检, 化验, 合格, 不合格, 超标, 指标, 馏程, 硫含量, 烯烃, 芳烃, 胶质, 密度, 十六烷指数, 辛烷值测试, LIMS, 出厂指标, 国标检测, 成品化验, 质量管控]
        load: static/quality/index.md
      crude:
        triggers: [原油, crude, 原油采购, 原油评价, 原油品种, ESPO, 萨中, Brent, 贴水, Dated Brent, 迪拜, 阿曼, 乌拉尔, 马西拉, SPIM, 运费, 加工利润, 原油选择, 采购决策, 到岸价]
        load: static/crude/index.md
      logistics:
        triggers: [物流, 配送, 销售, 出厂, 批直, 零售, 价差, 流向, 套利, 消费地, 零售价, 批发价, 出厂价, 运费, 沿海, 内陆, logistics, distribution, sales margin]
        load: static/logistics/index.md
      maintenance:
        triggers: [检修, 维修, 装置运行, 催化剂, 结焦, APC, DCS, 运行参数, 温度异常, 压力异常, turnaround, 检修计划, 停工检修, 装置维护, 运转周期]
        load: static/maintenance/index.md
      safety:
        triggers: [环保, 安全, 排污, VOCs, 碳排放, 碳配额, 废水, 废气, 固废, 排污许可, 碳排放权, 碳交易, 碳市场, GHG, 环境监测, 减排, 安全台账]
        load: static/safety/index.md
      risk:
        triggers: [价格, 风险, 套保, 期货, 对冲, 裂解价差, crack spread, 基差, 月差, 保值, 期权, 风险敞口, hedging, INE, 上海原油, 布伦特, WTI, 风险暴露, 价格波动]
        load: static/risk/index.md

  # ----- 任务类型 -----
  task_type:
    description: 用户期望的任务类型
    detect: "从用户请求的动词判断 — 优化/测算/计算→optimize, 预测→predict, 评估/比较→evaluate, 怎么回事/为什么→diagnose, 查一下/是多少→query, 汇总/报告→report"
    default: query
    values:
      optimize: ~
      predict: ~
      evaluate: ~
      diagnose: ~
      query: ~
      report: ~

  # ----- 用户角色 -----
  user_role:
    description: 用户的岗位角色，影响输出详细程度和关注点
    detect: "如果用户在上下文中有明确说明或用词专业，推断角色；否则默认 general"
    default: general
    values:
      scheduler: ~
      engineer: ~
      trader: ~
      manager: ~
      general: ~

  # ----- 范围 -----
  scope:
    description: 问题的时间/业务范围
    detect: "从时间表达推断 — 这次/这批→spot, 本周/本月→batch, 月度/季度/年度→monthly"
    default: spot
    values:
      spot: ~
      batch: ~
      monthly: ~
